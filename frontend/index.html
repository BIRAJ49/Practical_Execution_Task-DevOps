<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Web Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            color: #222;
            margin: 0;
            padding: 40px;
        }

        main {
            max-width: 700px;
            margin: auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #0f766e;
        }

        button {
            background-color: #0f766e;
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <main>
        <h1>Welcome to My DevOps Practical Website</h1>

        <p>This is a simple HTML page created for my DevOps practical exam.</p>

        <p>This page was updated to demonstrate a Git feature branch workflow.</p>

        <h2>My Skills</h2>
        <ul>
            <li>HTML</li>
            <li>Git</li>
            <li>GitHub</li>
        </ul>

        <p>Visit <a href="https://github.com" target="_blank">GitHub</a> to learn more.</p>

        <button>Click Me</button>
    </main>
</body>
</html>
